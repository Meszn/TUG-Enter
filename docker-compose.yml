version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: tug_user
      POSTGRES_PASSWORD: tug_password
      POSTGRES_DB: tug_enter
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tug_user -d tug_enter"]
      interval: 8s
      timeout: 5s
      retries: 6

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://tug_user:tug_password@db:5432/tug_enter
    volumes:
      - ./backend/uploads:/app/uploads
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  pgdata: